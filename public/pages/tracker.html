<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申请进度追踪 · 升学数据</title>
<link rel="stylesheet" href="../css/common.css">
<style>
:root {
  --c-primary: #4F46E5;
  --c-bg: #f5f7fa;
}
body { background: var(--c-bg); }

/* ===== 页面头 ===== */
.page-header-custom {
  padding: 24px 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.page-header-custom h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--c-text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.page-header-custom .subtitle {
  font-size: 13px;
  color: var(--c-text-secondary);
}
.add-btn {
  padding: 8px 20px;
  background: var(--c-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.add-btn:hover { background: var(--c-accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,.3); }
.add-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

/* ===== 看板布局 ===== */
.kanban-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-top: 8px;
  padding-bottom: 40px;
}
.kanban-column {
  background: var(--c-surface);
  border-radius: var(--radius-md);
  border: 1px solid var(--c-border);
  min-height: 200px;
  display: flex;
  flex-direction: column;
}
.kanban-column-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.kanban-column-header .col-title {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.kanban-column-header .col-title .col-icon { font-size: 16px; }
.kanban-column-header .col-count {
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 12px;
  font-weight: 500;
  background: var(--c-bg);
  color: var(--c-text-secondary);
}
.kanban-column-body {
  padding: 8px;
  flex: 1;
  overflow-y: auto;
  min-height: 80px;
}

/* ===== 卡片 ===== */
.kanban-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  border-left: 3px solid transparent;
}
.kanban-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
  border-color: var(--c-border-strong);
}
.kanban-card.priority-high { border-left-color: var(--c-danger); }
.kanban-card.priority-medium { border-left-color: var(--c-warning); }
.kanban-card.priority-low { border-left-color: var(--c-success); }
.kanban-card .card-school {
  font-size: 14px;
  font-weight: 600;
  color: var(--c-text);
  margin-bottom: 4px;
}
.kanban-card .card-program {
  font-size: 12px;
  color: var(--c-text-secondary);
  margin-bottom: 6px;
}
.kanban-card .card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--c-text-tertiary);
}
.kanban-card .card-meta .priority-tag {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 500;
}
.kanban-card .card-meta .priority-tag.high { background: var(--c-danger-bg); color: var(--c-danger); }
.kanban-card .card-meta .priority-tag.medium { background: var(--c-warning-bg); color: var(--c-warning); }
.kanban-card .card-meta .priority-tag.low { background: var(--c-success-bg); color: var(--c-success); }

/* 空状态 */
.empty-col {
  text-align: center;
  padding: 20px 10px;
  color: var(--c-text-tertiary);
  font-size: 12px;
}

/* 加载/错误 */
.loading-state, .error-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--c-text-secondary);
  font-size: 14px;
}
.error-state { color: var(--c-danger); }
.error-state .retry-btn {
  margin-top: 12px;
  padding: 8px 20px;
  background: var(--c-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
}

/* ===== 弹窗 ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.4);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-content {
  background: var(--c-surface);
  border-radius: var(--radius-lg);
  padding: 28px;
  width: 480px;
  max-width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  position: relative;
}
.modal-content h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}
.modal-content .modal-sub {
  font-size: 13px;
  color: var(--c-text-secondary);
  margin-bottom: 20px;
}
.modal-close {
  position: absolute;
  top: 12px; right: 16px;
  font-size: 20px;
  color: var(--c-text-tertiary);
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
  line-height: 1;
  transition: color var(--transition);
}
.modal-close:hover { color: var(--c-text); }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--c-text-secondary);
  margin-bottom: 6px;
}
.form-group select,
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--c-border-strong);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--c-bg);
  color: var(--c-text);
  outline: none;
  transition: border-color var(--transition);
  font-family: var(--font-sans);
}
.form-group select:focus,
.form-group input:focus,
.form-group textarea:focus { border-color: var(--c-primary); }
.form-group textarea { resize: vertical; min-height: 80px; }

.form-error {
  display: none;
  font-size: 12px;
  color: var(--c-danger);
  background: var(--c-danger-bg);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
}

.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}
.form-actions .btn-primary {
  flex: 1;
  padding: 10px;
  background: var(--c-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.form-actions .btn-primary:hover { background: var(--c-accent-hover); }
.form-actions .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.form-actions .btn-secondary {
  padding: 10px 20px;
  background: transparent;
  color: var(--c-text-secondary);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
}
.form-actions .btn-secondary:hover { border-color: var(--c-text-tertiary); }

/* 详情弹窗 */
.detail-field { margin-bottom: 12px; }
.detail-field .field-label {
  font-size: 11px;
  color: var(--c-text-tertiary);
  font-weight: 500;
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.detail-field .field-value {
  font-size: 14px;
  color: var(--c-text);
}
.detail-divider {
  height: 1px;
  background: var(--c-border);
  margin: 14px 0;
}
.detail-status-select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--c-border-strong);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--c-bg);
  color: var(--c-text);
  outline: none;
}

/* ===== 访客提示 ===== */
.visitor-prompt {
  text-align: center;
  padding: 80px 20px;
  background: var(--c-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--c-border);
  margin-top: 20px;
}
.visitor-prompt .icon { font-size: 48px; margin-bottom: 16px; }
.visitor-prompt h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.visitor-prompt p { font-size: 14px; color: var(--c-text-secondary); margin-bottom: 20px; max-width: 400px; margin-left: auto; margin-right: auto; }
.visitor-prompt .login-btn {
  padding: 10px 28px;
  background: var(--c-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.visitor-prompt .login-btn:hover { background: var(--c-accent-hover); transform: translateY(-2px); }

/* ===== 响应式 ===== */
@media(max-width: 900px) {
  .kanban-board { grid-template-columns: repeat(2, 1fr); }
}
@media(max-width: 600px) {
  .kanban-board { grid-template-columns: 1fr; }
  .page-header-custom { flex-direction: column; align-items: flex-start; }
  .modal-content { padding: 20px; }
  .form-actions { flex-direction: column; }
}

/* ===== 状态列颜色标识 ===== */
.col-planning .kanban-column-header { border-bottom-color: var(--c-text-tertiary); }
.col-planning .col-icon { color: var(--c-text-tertiary); }
.col-applying .kanban-column-header { border-bottom-color: var(--c-accent); }
.col-applying .col-icon { color: var(--c-accent); }
.col-submitted .kanban-column-header { border-bottom-color: #8B5CF6; }
.col-submitted .col-icon { color: #8B5CF6; }
.col-accepted .kanban-column-header { border-bottom-color: var(--c-success); }
.col-accepted .col-icon { color: var(--c-success); }
.col-rejected .kanban-column-header { border-bottom-color: var(--c-danger); }
.col-rejected .col-icon { color: var(--c-danger); }
.col-waitlisted .kanban-column-header { border-bottom-color: var(--c-warning); }
.col-waitlisted .col-icon { color: var(--c-warning); }

/* 滚动动画 */
.fade-in-section { opacity: 0; transform: translateY(16px); transition: all .4s ease; }
.fade-in-section.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

  <a href="../index.html" class="nav-logo"><span class="dot"></span> 升学数据</a>

<div class="page-container">

  <div class="page-header-custom fade-in-section" id="pageHeader">
    <div>
      <h1>📋 申请进度追踪</h1>
      <p class="subtitle">管理你的院校申请，拖拽或点击切换状态</p>
    </div>
    <button class="add-btn" id="addAppBtn" onclick="showAddModal()">＋ 添加新申请</button>
  </div>

  <!-- 访客提示 -->
  <div class="visitor-prompt fade-in-section" id="visitorPrompt" style="display:none;">
    <div class="icon">🔒</div>
    <h3>登录查看申请进度</h3>
    <p>登录后可以管理你的院校申请列表，追踪每个申请的进度状态。</p>
    <button class="login-btn" onclick="AUTH.showLoginModal()">🔑 立即登录</button>
  </div>

  <!-- 加载状态 -->
  <div class="loading-state" id="loadingState">
    <p>⏳ 加载申请数据...</p>
  </div>

  <!-- 错误状态 -->
  <div class="error-state" id="errorState" style="display:none;">
    <p>⚠️ <span id="errorMsg">加载失败</span></p>
    <button class="retry-btn" onclick="loadApplications()">🔄 重试</button>
  </div>

  <!-- 看板 -->
  <div class="kanban-board fade-in-section" id="kanbanBoard" style="display:none;"></div>

</div>

<footer class="footer">
  <p>数据来源：你的申请记录 · 云端同步</p>
</footer>

<!-- 添加/编辑弹窗 -->
<div class="modal-overlay" id="addModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    <h2 id="addModalTitle">➕ 添加新申请</h2>
    <p class="modal-sub" id="addModalSub">选择院校和专业，创建申请记录</p>

    <div class="form-error" id="formError"></div>

    <form id="addForm" onsubmit="return false;">
      <div class="form-group">
        <label for="appSchool">院校 *</label>
        <select id="appSchool" onchange="onSchoolChange()">
          <option value="">请选择院校</option>
        </select>
      </div>

      <div class="form-group">
        <label for="appProgram">专业方向</label>
        <select id="appProgram">
          <option value="">请先选择院校（可选）</option>
        </select>
      </div>

      <div class="form-group">
        <label for="appDeadline">截止日期</label>
        <input type="date" id="appDeadline">
      </div>

      <div class="form-group">
        <label for="appPriority">优先级</label>
        <select id="appPriority">
          <option value="high">🔴 高优先级</option>
          <option value="medium" selected>🟡 中优先级</option>
          <option value="low">🟢 低优先级</option>
        </select>
      </div>

      <div class="form-group">
        <label for="appNotes">备注</label>
        <textarea id="appNotes" placeholder="申请备注、信息、待办事项..."></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-primary" id="formSubmitBtn" onclick="handleFormSubmit()">提交</button>
        <button type="button" class="btn-secondary" onclick="closeModal('addModal')">取消</button>
      </div>
    </form>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    <h2 id="detailTitle">申请详情</h2>
    <p class="modal-sub" id="detailSub">查看和更新申请信息</p>

    <div id="detailContent"></div>
  </div>
</div>

<script src="../js/i18n.js"></script>
<script src="../js/auth.js"></script>
<script>
// ===== 状态配置 =====
const STATUSES = [
  { key: 'planning', label: '规划中', icon: '📝' },
  { key: 'applying', label: '申请中', icon: '✍️' },
  { key: 'submitted', label: '已提交', icon: '📨' },
  { key: 'waitlisted', label: '候补中', icon: '⏳' },
  { key: 'accepted', label: '已录取', icon: '🎉' },
  { key: 'rejected', label: '已拒绝', icon: '😢' }
];

const PRIORITY_LABELS = {
  high: { label: '高优先级', emoji: '🔴', cls: 'high' },
  medium: { label: '中优先级', emoji: '🟡', cls: 'medium' },
  low: { label: '低优先级', emoji: '🟢', cls: 'low' }
};

let applications = [];
let schools = [];
let editingId = null;
let token = null;

// ===== 工具 =====
function getToken() {
  try {
    const raw = localStorage.getItem('admission_token');
    return raw ? JSON.parse(raw).token : null;
  } catch { return null; }
}

function getAuthHeaders() {
  const t = getToken();
  return t ? {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + t
  } : { 'Content-Type': 'application/json' };
}

// ===== 加载数据 =====
async function loadSchools() {
  try {
    const resp = await fetch('/api/schools');
    const data = await resp.json();
    schools = data.schools || [];
    populateSchoolSelect();
  } catch (e) {
    console.error('加载学校列表失败', e);
  }
}

function populateSchoolSelect() {
  const sel = document.getElementById('appSchool');
  sel.innerHTML = '<option value="">请选择院校</option>';
  schools.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name + (s.city ? ' · ' + s.city : '') + (s.province ? ' (' + s.province + ')' : '');
    sel.appendChild(opt);
  });
}

function onSchoolChange() {
  const schoolId = parseInt(document.getElementById('appSchool').value);
  const progSel = document.getElementById('appProgram');
  progSel.innerHTML = '<option value="">选择专业方向（可选）</option>';

  if (!schoolId) return;
  const school = schools.find(s => s.id === schoolId);
  if (!school || !school.programs) return;

  school.programs.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.category_name || p.category;
    progSel.appendChild(opt);
  });
}

async function loadApplications() {
  const loadingEl = document.getElementById('loadingState');
  const errorEl = document.getElementById('errorState');
  const boardEl = document.getElementById('kanbanBoard');
  const visitorEl = document.getElementById('visitorPrompt');
  const addBtn = document.getElementById('addAppBtn');

  errorEl.style.display = 'none';
  loadingEl.style.display = 'block';
  boardEl.style.display = 'none';

  if (!AUTH.isLoggedIn()) {
    loadingEl.style.display = 'none';
    visitorEl.style.display = 'block';
    addBtn.disabled = true;
    return;
  }

  visitorEl.style.display = 'none';
  addBtn.disabled = false;

  try {
    const resp = await fetch('/api/applications', { headers: getAuthHeaders() });
    if (!resp.ok) throw new Error('加载失败');
    const data = await resp.json();
    applications = data.applications || [];

    loadingEl.style.display = 'none';
    boardEl.style.display = '';
    renderBoard();
  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    document.getElementById('errorMsg').textContent = e.message || '网络错误，请重试';
  }
}

// ===== 渲染看板 =====
function renderBoard() {
  const board = document.getElementById('kanbanBoard');
  board.innerHTML = '';

  STATUSES.forEach(status => {
    const cols = applications.filter(a => a.status === status.key);
    const col = document.createElement('div');
    col.className = 'kanban-column col-' + status.key + ' fade-in-section';
    col.innerHTML = `
      <div class="kanban-column-header">
        <div class="col-title">
          <span class="col-icon">${status.icon}</span>
          ${status.label}
        </div>
        <span class="col-count">${cols.length}</span>
      </div>
      <div class="kanban-column-body" data-status="${status.key}">
        ${cols.length === 0
          ? '<div class="empty-col">暂无申请</div>'
          : cols.map(a => renderCard(a)).join('')}
      </div>
    `;
    board.appendChild(col);

    // 滚动动画
    setTimeout(() => col.classList.add('visible'), 50);
  });
}

function renderCard(app) {
  const p = PRIORITY_LABELS[app.priority] || PRIORITY_LABELS.medium;
  const deadline = app.deadline ? formatDate(app.deadline) : '—';
  const program = app.program_category || '';
  return `
    <div class="kanban-card priority-${app.priority}" data-id="${app.id}" onclick="showDetail(${app.id})">
      <div class="card-school">${app.school_name || '未知院校'}</div>
      <div class="card-program">${program || '未选择专业'}</div>
      <div class="card-meta">
        <span>📅 ${deadline}</span>
        <span class="priority-tag ${p.cls}">${p.emoji} ${p.label}</span>
      </div>
    </div>
  `;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return m + '/' + day;
}

// ===== 添加/编辑弹窗 =====
function showAddModal() {
  if (!AUTH.isLoggedIn()) { AUTH.showLoginModal(); return; }
  editingId = null;
  document.getElementById('addModalTitle').textContent = '➕ 添加新申请';
  document.getElementById('addModalSub').textContent = '选择院校和专业，创建申请记录';
  document.getElementById('formSubmitBtn').textContent = '提交';
  document.getElementById('appSchool').value = '';
  document.getElementById('appProgram').innerHTML = '<option value="">请先选择院校（可选）</option>';
  document.getElementById('appDeadline').value = '';
  document.getElementById('appPriority').value = 'medium';
  document.getElementById('appNotes').value = '';
  document.getElementById('formError').style.display = 'none';
  openModal('addModal');
}

function showEditModal(app) {
  editingId = app.id;
  document.getElementById('addModalTitle').textContent = '✏️ 编辑申请';
  document.getElementById('addModalSub').textContent = '修改申请信息';
  document.getElementById('formSubmitBtn').textContent = '保存修改';

  // 预填学校
  document.getElementById('appSchool').value = app.school_id || '';
  onSchoolChange();

  // 预填专业（需要等学校加载完成）
  setTimeout(() => {
    if (app.program_id) document.getElementById('appProgram').value = app.program_id;
  }, 100);

  document.getElementById('appDeadline').value = app.deadline ? app.deadline.substring(0, 10) : '';
  document.getElementById('appPriority').value = app.priority || 'medium';
  document.getElementById('appNotes').value = app.notes || '';
  document.getElementById('formError').style.display = 'none';
  openModal('addModal');
}

async function handleFormSubmit() {
  const schoolId = parseInt(document.getElementById('appSchool').value);
  const programId = document.getElementById('appProgram').value ? parseInt(document.getElementById('appProgram').value) : null;
  const deadline = document.getElementById('appDeadline').value || null;
  const priority = document.getElementById('appPriority').value;
  const notes = document.getElementById('appNotes').value.trim() || null;
  const errorEl = document.getElementById('formError');
  const btn = document.getElementById('formSubmitBtn');

  if (!schoolId || isNaN(schoolId)) {
    errorEl.style.display = 'block';
    errorEl.textContent = '请选择院校';
    return;
  }

  btn.disabled = true;
  btn.textContent = editingId ? '保存中...' : '提交中...';
  errorEl.style.display = 'none';

  try {
    if (editingId) {
      // 编辑 - 使用 PUT
      const resp = await fetch('/api/applications/' + editingId, {
        method: 'PUT',
        headers: getAuthHeaders(),
        body: JSON.stringify({ school_id: schoolId, program_id: programId, deadline, priority, notes })
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error || '保存失败');
      }
    } else {
      // 新建 - 使用 POST
      const resp = await fetch('/api/applications', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({ school_id: schoolId, program_id: programId, deadline, priority, notes })
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error || '创建失败');
      }
    }

    closeModal('addModal');
    loadApplications();
  } catch (e) {
    errorEl.style.display = 'block';
    errorEl.textContent = e.message || '操作失败，请重试';
  } finally {
    btn.disabled = false;
    btn.textContent = editingId ? '保存修改' : '提交';
  }
}

function getApp(id) {
  return applications.find(a => a.id === id);
}

async function updateStatus(appId, newStatus) {
  try {
    const resp = await fetch('/api/applications/' + appId, {
      method: 'PUT',
      headers: getAuthHeaders(),
      body: JSON.stringify({ status: newStatus })
    });
    if (!resp.ok) throw new Error('更新失败');
    loadApplications();
  } catch (e) {
    alert('状态更新失败：' + e.message);
  }
}

async function updatePriority(appId, newPriority) {
  try {
    const resp = await fetch('/api/applications/' + appId, {
      method: 'PUT',
      headers: getAuthHeaders(),
      body: JSON.stringify({ priority: newPriority })
    });
    if (!resp.ok) throw new Error('更新失败');
    loadApplications();
  } catch (e) {
    alert('优先级更新失败：' + e.message);
  }
}

// ===== 弹窗控制 =====
function openModal(id) {
  document.getElementById(id).classList.add('show');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// 点击弹窗外部关闭
document.addEventListener('click', function(e) {
  ['addModal', 'detailModal'].forEach(id => {
    const overlay = document.getElementById(id);
    if (overlay && overlay.classList.contains('show')) {
      if (e.target === overlay) closeModal(id);
    }
  });
});
